<!DOCTYPE html>
<html>
<head>
  <title>YSL Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body style="background:black; color:white; font-family:sans-serif; text-align:center;">

<h1>YOUNGSAVAGELOVE</h1>
<p>Live Graph</p>

<canvas id="chart" width="800" height="400"></canvas>

<script>
const ctx = document.getElementById('chart');

new Chart(ctx, {
  type: 'line',
  data: {
    labels: ['1','2','3','4','5','6','7','8'],
    datasets: [
      {
        label: 'YouTube',
        data: [100,200,150,300,250,400,350,500],
        borderColor: 'red'
      },
      {
        label: 'Spotify',
        data: [80,120,90,140,110,160,130,180],
        borderColor: 'green'
      },
      {
        label: 'TikTok',
        data: [150,300,200,400,350,450,420,480],
        borderColor: 'cyan'
      }
    ]
  }
});
</script>

</body>
</html>
