<!DOCTYPE html>
<html>
<head>
  <title>YSL Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="background:#050505; color:white; font-family:Arial; margin:0; padding:30px;">

<h1 style="text-align:center; font-size:40px;">YOUNGSAVAGELOVE</h1>
<p style="text-align:center; color:#888;">Live Activity</p>

<!-- STATS -->
<div style="display:flex; justify-content:space-center; gap:20px; margin:30px 0; flex-wrap:wrap;">
  <div style="background:#111; padding:20px; border-radius:12px; width:200px;">
    <p>Total Streams</p>
    <h2 style="color:#00ff88;">1,543,085</h2>
  </div>

  <div style="background:#111; padding:20px; border-radius:12px; width:200px;">
    <p>Total Listeners</p>
    <h2 style="color:#ff8800;">565,142</h2>
  </div>

  <div style="background:#111; padding:20px; border-radius:12px; width:200px;">
    <p>Total Views</p>
    <h2 style="color:#ff3333;">8,005,093</h2>
  </div>

  <div style="background:#111; padding:20px; border-radius:12px; width:200px;">
    <p>Platforms</p>
    <h2 style="color:#00e5ff;">4</h2>
  </div>
</div>

<!-- GRAPH -->
<canvas id="chart" height="120"></canvas>

<script>
const ctx = document.getElementById('chart');

new Chart(ctx, {
  type: 'line',
  data: {
    labels: ['1','2','3','4','5','6','7','8'],
    datasets: [
      {
        label: 'YouTube',
        data: [100,200,150,300,250,400,350,500],
        borderColor: '#ff0000',
        tension: 0.4
      },
      {
        label: 'Spotify',
        data: [80,120,90,140,110,160,130,180],
        borderColor: '#00ff88',
        tension: 0.4
      },
      {
        label: 'TikTok',
        data: [150,300,200,400,350,450,420,480],
        borderColor: '#00e5ff',
        tension: 0.4
      }
    ]
  },
  options: {
    plugins: {
      legend: {
        labels: {
          color: 'white'
        }
      }
    },
    scales: {
      x: {
        ticks: { color: '#777' },
        grid: { color: '#111' }
      },
      y: {
        ticks: { color: '#777' },
        grid: { color: '#111' }
      }
    }
  }
});
</script>

</body>
</html>
