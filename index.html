<!DOCTYPE html>
<html>
<head>
  <title>YSL Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="background:#050505; color:white; font-family:Arial; margin:0; padding:30px;">

<h1 style="text-align:center; font-size:40px;">YOUNGSAVAGELOVE</h1>
<p style="text-align:center; color:#888;">Live Activity</p>

<!-- STATS -->
<div style="display:flex; justify-content:space-center; gap:20px; margin:30px 0; flex-wrap:wrap;">
  <div style="background:#111; padding:20px; border-radius:12px; width:200px;">
    <p>Total Streams</p>
    <h2 style="color:#00ff88;">1,543,085</h2>
  </div>

  <div style="background:#111; padding:20px; border-radius:12px; width:200px;">
    <p>Total Listeners</p>
    <h2 style="color:#ff8800;">565,142</h2>
  </div>

  <div style="background:#111; padding:20px; border-radius:12px; width:200px;">
    <p>Total Views</p>
    <h2 style="color:#ff3333;">8,005,093</h2>
  </div>

  <div style="background:#111; padding:20px; border-radius:12px; width:200px;">
    <p>Platforms</p>
    <h2 style="color:#00e5ff;">4</h2>
  </div>
</div>

<!-- GRAPH -->
<canvas id="chart" height="120"></canvas>

<script>
const ctx = document.getElementById('chart');

<script>
const ctx = document.getElementById('chart');

let youtube = 100;
let spotify = 80;
let tiktok = 150;

const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [
      {
        label: 'YouTube',
        data: [],
        borderColor: '#ff0000',
        tension: 0.4
      },
      {
        label: 'Spotify',
        data: [],
        borderColor: '#00ff88',
        tension: 0.4
      },
      {
        label: 'TikTok',
        data: [],
        borderColor: '#00e5ff',
        tension: 0.4
      }
    ]
  }
});

function updateData() {
  youtube += Math.floor(Math.random() * 50);
  spotify += Math.floor(Math.random() * 20);
  tiktok += Math.floor(Math.random() * 60);

  chart.data.labels.push('');
  chart.data.datasets[0].data.push(youtube);
  chart.data.datasets[1].data.push(spotify);
  chart.data.datasets[2].data.push(tiktok);

  if (chart.data.labels.length > 20) {
    chart.data.labels.shift();
    chart.data.datasets.forEach(d => d.data.shift());
  }

  chart.update();
}

setInterval(updateData, 2000);
</script>
